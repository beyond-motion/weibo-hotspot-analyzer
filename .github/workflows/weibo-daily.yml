name: 微博热搜每日分析

on:
  schedule:
    # 每天 UTC 02:00 执行 (北京时间 10:00)
    - cron: '0 2 * * *'
    # 每天 UTC 14:00 执行 (北京时间 22:00)
    - cron: '0 14 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  weibo-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip

      - name: 抓取微博热搜
        env:
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}
        run: |
          python scripts/fetch_weibo_hot.py

      - name: Claude AI 分析创意
        env:
          API_ENDPOINT: ${{ secrets.API_ENDPOINT }}
          API_KEY: ${{ secrets.API_KEY }}
          API_MODEL: ${{ secrets.API_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/claude_analysis.py

      - name: 生成 HTML 报告
        run: |
          python scripts/generate_html_report.py

      - name: 验证报告已生成
        run: |
          echo "🔍 查找生成的报告文件..."
          sync
          ls -la reports/
          find reports/ -name "*.html" -type f || find . -name "weibo_hotspot_report_*.html" -type f
          REPORT_FILE=$(find reports/ -name "*.html" -type f 2>/dev/null | head -1)
          if [ -z "$REPORT_FILE" ]; then
            REPORT_FILE=$(find . -name "weibo_hotspot_report_*.html" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$REPORT_FILE" ]; then
            echo "✅ 找到报告: $REPORT_FILE"
            cp "$REPORT_FILE" weibo_hotspot_report_latest.html
          else
            echo "❌ 未找到生成的报告文件"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi

      - name: 移动报告到输出目录
        run: |
          REPORT_FILE="weibo_hotspot_report_latest.html"
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          YEAR_MONTH=$(date +%Y/%m)

          mkdir -p "reports/${YEAR_MONTH}"

          cp "$REPORT_FILE" "reports/${YEAR_MONTH}/${TIMESTAMP}_weibo_hotspot_report.html"
          echo "✅ 报告已复制到: reports/${YEAR_MONTH}/${TIMESTAMP}_weibo_hotspot_report.html"

          # 创建 latest 副本
          cp "$REPORT_FILE" "reports/${YEAR_MONTH}/latest_weibo_hotspot_report.html"
          echo "✅ 已创建 latest 副本"

      - name: 更新首页重定向
        run: |
          YEAR_MONTH=$(date +%Y/%m)
          LATEST_PATH="/reports/${YEAR_MONTH}/latest_weibo_hotspot_report.html"
          
          echo "🔄 更新 index.html 中的重定向路径..."
          echo "原内容:"
          grep 'meta http-equiv="refresh"' index.html || true
          
          # 使用更可靠的 sed 命令
          sed -i.bak "s|url=/reports/[0-9]\{4\}/[0-9]\{2\}/latest_weibo_hotspot_report\.html|url=${LATEST_PATH}|g" index.html
          sed -i.bak "s|href=\"/reports/[0-9]\{4\}/[0-9]\{2\}/latest_weibo_hotspot_report\.html\"|href=\"${LATEST_PATH}\"|g" index.html
          sed -i.bak "s|window\.location\.href = '/reports/[0-9]\{4\}/[0-9]\{2\}/latest_weibo_hotspot_report\.html'|window.location.href = '${LATEST_PATH}'|g" index.html
          
          rm -f index.html.bak
          
          echo "新内容:"
          grep 'meta http-equiv="refresh"' index.html || true
          echo "✅ 已更新 index.html 重定向到: $LATEST_PATH"

      - name: 提交报告
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          echo "📋 检查待提交的文件..."
          git status
          
          # 明确添加所有需要提交的文件
          git add reports/
          git add index.html
          
          echo "📦 待提交的更改:"
          git diff --staged --stat
          
          # 只有有更改时才提交
          if ! git diff --staged --quiet; then
            git commit -m "🤖 自动生成微博热搜报告 $(date +%Y-%m-%d)"
            echo "✅ 提交成功"
          else
            echo "ℹ️ 没有需要提交的更改"
          fi
          
          # 推送到主分支触发 Vercel 部署
          git push origin main

