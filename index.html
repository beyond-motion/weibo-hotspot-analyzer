<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/reports/2026/06/latest_weibo_hotspot_report.html">
    <title>微博热搜分析报告 - 跳转中...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .container {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: fadeIn 0.5s ease-in;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        .link {
            margin-top: 2rem;
            font-size: 1rem;
            opacity: 0.8;
        }
        .link a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid white;
            transition: opacity 0.3s;
        }
        .link a:hover {
            opacity: 0.7;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 微博热搜分析报告</h1>
        <div class="spinner"></div>
        <p>正在跳转到最新报告...</p>
        <div class="link">
            <p>如果没有自动跳转，请<a href="/reports/2026/06/latest_weibo_hotspot_report.html">点击这里</a></p>
        </div>
    </div>
    <script>
        // 备用 JavaScript 重定向
        setTimeout(function() {
            window.location.href = '/reports/2026/06/latest_weibo_hotspot_report.html';
        }, 100);
    </script>
</body>
</html>
